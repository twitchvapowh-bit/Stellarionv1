<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&amp;family=Rajdhani:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
  @keyframes stl-twinkle { 0%,100%{opacity:.35} 50%{opacity:1} }
  @keyframes stl-orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</helmet>
<div style="min-height:100%;background:#0a1424;display:flex;flex-direction:column;font-family:'Rajdhani',sans-serif">

  <!-- IN-CONTEXT HEADER -->
  <div style="background:linear-gradient(180deg,#14243f 0%,#0d1a30 100%);border-bottom:1px solid rgba(90,150,230,.25);padding:14px 22px;display:flex;align-items:center;gap:26px">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:42px;height:42px;position:relative;flex-shrink:0">
        <div style="position:absolute;inset:0;animation:stl-orbit 18s linear infinite">
          <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
            <ellipse cx="21" cy="21" rx="19" ry="8" transform="rotate(-28 21 21)" stroke="#3d6fc4" stroke-width="1.4" opacity=".55"></ellipse>
            <circle cx="4.7" cy="27" r="2.1" fill="#7fd4ff"></circle>
          </svg>
        </div>
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" style="position:absolute;inset:0">
          <defs>
            <radialGradient id="core" cx="50%" cy="45%" r="60%">
              <stop offset="0%" stop-color="#dff3ff"></stop>
              <stop offset="45%" stop-color="#69b8ff"></stop>
              <stop offset="100%" stop-color="#2b5cc0"></stop>
            </radialGradient>
          </defs>
          <path d="M21 6 L23.8 18.2 L36 21 L23.8 23.8 L21 36 L18.2 23.8 L6 21 L18.2 18.2 Z" fill="url(#core)"></path>
          <circle cx="21" cy="21" r="4.6" fill="#eaf6ff"></circle>
          <circle cx="21" cy="21" r="9" stroke="#7fd4ff" stroke-width="1" opacity=".5"></circle>
        </svg>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1">
        <div style="font-family:'Orbitron',sans-serif;font-weight:800;font-size:22px;letter-spacing:5px;background:linear-gradient(90deg,#eaf6ff,#7fb4ff 60%,#4d86e6);-webkit-background-clip:text;background-clip:text;color:transparent">STELLARION</div>
        <div style="font-size: 11px; letter-spacing: 2.5px; color: #5f86c0; margin-top: 5px; text-transform: uppercase; display: none">Univers · Carousel Edition</div>
      </div>
    </div>
    <div style="flex:1"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:12px;color:#6d93cc;letter-spacing:1px">Alpha 1.5.42d</span>
      <span style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80"></span>
      <span style="font-size:12px;color:#8fb4e6">cloud OK</span>
    </div>
  </div>

  <!-- SHOWCASE -->
  <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0">

    <!-- Dark swatch -->
    <div style="background:radial-gradient(circle at 35% 30%,#13233f 0%,#070e1a 75%);display:flex;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden">
      <div style="position:absolute;top:18%;left:20%;width:2px;height:2px;background:#fff;border-radius:50%;animation:stl-twinkle 3s infinite"></div>
      <div style="position:absolute;top:60%;left:15%;width:2px;height:2px;background:#9fd0ff;border-radius:50%;animation:stl-twinkle 4s .5s infinite"></div>
      <div style="position:absolute;top:30%;right:22%;width:2px;height:2px;background:#fff;border-radius:50%;animation:stl-twinkle 2.6s 1s infinite"></div>
      <div style="position:absolute;bottom:22%;right:28%;width:3px;height:3px;background:#7fd4ff;border-radius:50%;animation:stl-twinkle 3.4s .3s infinite"></div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
        <div style="width:120px;height:120px;position:relative">
          <div style="position:absolute;inset:0;animation:stl-orbit 22s linear infinite">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
              <ellipse cx="60" cy="60" rx="54" ry="22" transform="rotate(-28 60 60)" stroke="#3d6fc4" stroke-width="1.6" opacity=".5"></ellipse>
              <circle cx="14" cy="76" r="4.5" fill="#7fd4ff"></circle>
            </svg>
          </div>
          <div style="position:absolute;inset:0;animation:stl-orbit 30s linear infinite reverse">
            <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
              <ellipse cx="60" cy="60" rx="50" ry="18" transform="rotate(38 60 60)" stroke="#2b4f92" stroke-width="1.2" opacity=".4"></ellipse>
              <circle cx="104" cy="46" r="3" fill="#a9dcff"></circle>
            </svg>
          </div>
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none" style="position:absolute;inset:0">
            <defs>
              <radialGradient id="core2" cx="50%" cy="45%" r="60%">
                <stop offset="0%" stop-color="#f2faff"></stop>
                <stop offset="42%" stop-color="#69b8ff"></stop>
                <stop offset="100%" stop-color="#2b5cc0"></stop>
              </radialGradient>
              <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
            </defs>
            <path d="M60 14 L67 51 L104 60 L67 69 L60 106 L53 69 L16 60 L53 51 Z" fill="url(#core2)" filter="url(#glow)"></path>
            <circle cx="60" cy="60" r="13" fill="#eaf6ff"></circle>
            <circle cx="60" cy="60" r="26" stroke="#7fd4ff" stroke-width="1.3" opacity=".45"></circle>
          </svg>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center">
          <div style="font-family:'Orbitron',sans-serif;font-weight:800;font-size:40px;letter-spacing:9px;background:linear-gradient(90deg,#eaf6ff,#7fb4ff 60%,#4d86e6);-webkit-background-clip:text;background-clip:text;color:transparent;padding-left:9px">STELLARION</div>
          <div style="font-size:14px;letter-spacing:5px;color:#5f86c0;margin-top:8px;text-transform:uppercase">Univers</div>
        </div>
      </div>
    </div>

    <!-- Variants panel -->
    <div style="background:#0c1728;display:flex;flex-direction:column;justify-content:center;gap:34px;padding:56px 48px;border-left:1px solid rgba(90,150,230,.15)">
      <div style="font-size:12px;letter-spacing:3px;color:#4f6d9c;text-transform:uppercase">Variantes</div>

      <!-- compact lockup -->
      <div style="display:flex;align-items:center;gap:12px">
        <svg width="34" height="34" viewBox="0 0 42 42" fill="none">
          <path d="M21 6 L23.8 18.2 L36 21 L23.8 23.8 L21 36 L18.2 23.8 L6 21 L18.2 18.2 Z" fill="url(#core)"></path>
          <circle cx="21" cy="21" r="4.6" fill="#eaf6ff"></circle>
        </svg>
        <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:19px;letter-spacing:4px;color:#dceaff">STELLARION</div>
      </div>

      <!-- emblem only -->
      <div style="display:flex;align-items:center;gap:16px">
        <div style="width:52px;height:52px;border:1px solid rgba(90,150,230,.25);border-radius:12px;display:flex;align-items:center;justify-content:center;background:#0a1424">
          <svg width="34" height="34" viewBox="0 0 42 42" fill="none">
            <path d="M21 6 L23.8 18.2 L36 21 L23.8 23.8 L21 36 L18.2 23.8 L6 21 L18.2 18.2 Z" fill="url(#core)"></path>
            <circle cx="21" cy="21" r="4.6" fill="#eaf6ff"></circle>
          </svg>
        </div>
        <div style="font-size:13px;color:#6d93cc;line-height:1.5">Icône seule — favicon,<br>onglet, app mobile</div>
      </div>

      <!-- monochrome -->
      <div style="display:flex;align-items:center;gap:12px">
        <svg width="30" height="30" viewBox="0 0 42 42" fill="none">
          <path d="M21 6 L23.8 18.2 L36 21 L23.8 23.8 L21 36 L18.2 23.8 L6 21 L18.2 18.2 Z" fill="#dceaff"></path>
        </svg>
        <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;color:#dceaff">STELLARION</div>
      </div>

      <div style="font-size:12px;color:#425d86;line-height:1.6;margin-top:6px">Police <b style="color:#7fb4ff">Orbitron</b> · étoile à 4 branches avec orbites — le mark reste lisible à 16px dans une barre d'entête.</div>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
